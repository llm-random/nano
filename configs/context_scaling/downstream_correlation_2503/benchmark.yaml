# @package _global_
defaults:
  - /_cluster@_here_: helios
  - /_model/context_scaling@_here_: k12
  - /_trainer@_here_: context_scaling
  - /_dataset@_here_: ctx_scl_dataset
  - /_misc@_here_: default
  - /_checkpoints/context_scaling@_here_: shared_helios
  - /_eval@_here_: joint
  - _self_

# Benchmark config for MFU A/B testing
# Pure training throughput: no eval, no heavy metrics, 500 steps

common:
  kv_heads: 12

  sequence_length: 2048
  batch_size: 64
  data_seed: 123
  model_seed: 123

trainer:
  gradient_accumulation_steps: 1
  n_steps: 2001
  learning_rate: 12
  eval_interval: 0
  lm_eval_interval: 0

  compile:
    enabled: true
    mode: "reduce-overhead"

  train_dataloader:
    num_workers: 4
    dataset:
      data_generator:
        path: ${cluster_switch.train_path_fineweb}

  eval_dataloader:
    num_workers: 4
    dataset:
      data_generator:
        path: ${cluster_switch.eval_path_fineweb}

infrastructure:
  metric_logger:
    heavy_metrics_calculation_interval: 0
    name: mfu_benchmark
    tags:
      - nano
      - benchmark

  slurm:
    time: "0-02:00:00"
    gres: gpu:4
    job-name: ${infrastructure.metric_logger.name}
