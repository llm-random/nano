defaults:
  - _cluster@_here_: entropy
  - _model/jk_moe_check@_here_: tiny
  - _trainer@_here_: llama
  - _dataset@_here_: c4
  - _checkpoints@_here_: none
  - _misc@_here_: default
  - _eval@_here_: basic
  - _self_

common:
  sequence_length: 128
  batch_size: 128

trainer:
  gradient_accumulation_steps: 1
  n_steps: 100
  learning_rate: 1e-3

  checkpoint:
    save:
      type: nano
      path: checkpoint

infrastructure:
  max_concurrent_jobs: 1

  metric_logger:
    type: wandb
    wandb_entity: ideas_cv
    project_name: llm-random-test
    name: moe
    tags:
      - nano
      - remote
      - tiny
      - moe

  slurm:
    time: "00:10:00"
    gres: gpu:1
    job-name: ${infrastructure.metric_logger.name}

evaluator:
  limit: 10
