defaults:
  - ../_cluster@_here_: helios
  - ../_model@_here_: llama_3_8
  - ../_trainer@_here_: llama
  - ../_dataset@_here_: c4 # not used - loads slower
  - ../_checkpoints@_here_: none
  - ../_misc@_here_: default


common: 
  batch_size: 512

  # dmodel: 3072 # 50p
  # dff: 9216
  # dmodel: 2160 # 30p
  # dff: 6480
  dmodel: 1056 # 10p
  dff: 3168

trainer:
  n_steps: 0 # not used
  learning_rate: 1 # not used
  gradient_accumulation_steps: 1 # not used

  checkpoint:
    load:
      # type: finalized_pc
      type: nano
      path: ???
    save:
      type: huggingface
      path: ???

infrastructure:
  metric_logger:
    name: conversion
    tags:
      - nano
      - pc
      - hard_pruning
      - llama_8
      - hf_conversion

  slurm: 
    gres: gpu:4
    time: "0-01:00:00"
