# notebook for producing a PC checkpoint used for PC_memeff training

defaults:
  - ../_misc@_here_: default
  - ../_cluster@_here_: entropy
  - ../_model/llama@_here_: 1B
  - _self_


trainer:
  checkpoint:
    load:
      type: huggingface
      path: "meta-llama/Llama-3.2-1B"

    save:
      path: ???

infrastructure:
  metric_logger:
    name: PC_save_pretrained_hf_to_nano
    tags:
      - nano
      - pc
      - save_pretrained
  
  slurm: 
    job-name: ${infrastructure.metric_logger.name}
    gres: gpu:1
    time: "0-01:00:00"

init_model_opt_sched_fn: 
  _target_: src.core.llama.save_pretrained_llama_as_nano
  _partial_: true