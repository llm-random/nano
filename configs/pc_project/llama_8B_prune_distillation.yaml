  #   - 13
  #   - 14

  # ^learning_rate: #50p
  # - 11
  # - 12
  # - 13
  # - 14

  scheduler:
    warmup_steps: 40

  eval_interval: 1000000
  eval_dataloader: None

  checkpoint:
   load:
    type: huggingface
    path: "meta-llama/Llama-3.1-8B" 
   save:  
    type: nano
    # path: /lustre/pd01/plgrid/plgllmefficont2/projected_compression/checkpoints/tmp #lem
    # path: /storage_nvme_3/mstefaniak/nano_checkpoints/tmp # entropy
    path: /net/scratch/hscra/plgrid/plgmstefaniak/checkpoints/tem # #helios

#devchange
infrastructure:
  metric_logger:
    name: Llame_HP
    tags:
      - nano
      - pc
      - llama_8
      - hard_pruning
      - distillation
      # - 10p
      # - 30p
      - 50p
      - longer
      # - nodes2
  
  slurm:
    job-name: ${infrastructure.metric_logger.name} #devchange
    # gres: "gpu:hopper:4"
    gres: gpu:4
    # nodes: 2 #dev
    # time: "0-0:30:00"
    # time: "0-8:00:00"
    # time: "0-10:00:00" # 10p
    # time: "0-12:00:00" # 30p
    # time: "0-14:00:00" # 50p
    time: "2-00:00:00" # longer
    # time: "3-00:00:00" # longer
 
apply_functions:
  - _target_: src.projected_compression.pruning.prune
    _partial_: true
    
    # dimensions_importances_path: /lustre/pd01/plgrid/plgllmefficont2/projected_compression/importances/8b/minitron_dimensions_importances.pt # lem ACTIVATIONS llama8 ######################################
    dimensions_importances_path: /net/storage/pr3/plgrid/plggllmeffi/projected_compression/20260120_importances/minitron_dimensions_importances.pt # helios ACTIVATIONS llama8 ######################################
    # dimensions_importances_path: /storage_nvme_3/mstefaniak/pc/llama8_fw_importances_8m/117045/0/minitron_dimensions_importances.pt # entropy ACTIVATIONS llama8 ######################################


