  - ../_trainer@_here_: llama3_8B_distillation
  - ../_dataset@_here_: fineweb
  - ../_checkpoints@_here_: none
  - ../_misc@_here_: default


common:
  sequence_length: 2048
  batch_size: 512


  #devchange
  # target_dmodel: 1056 # 10p
  # target_dff: 3168
  # target_dmodel: 2160 # 30p
  # target_dff: 6480
  target_dmodel: 3072 # 50p
  target_dff: 9216
  
trainer:
  # gradient_accumulation_steps: 16
  gradient_accumulation_steps: 32 # 50p # 30p # 10p
  ^n_steps: 
    - 6144
    - 4096
    - 2048
    - 1024

  #devchange
  # learning_rate: 9 #optimal fo 10p
  # learning_rate: 13 #optimal fo 30p
  learning_rate: 12 #optimal fo 50p

  #devchange
  # learning_rate: 10 #optimal fo 10p
  # learning_rate: 11 #optimal fo 10p
  # learning_rate: 12 #optimal fo 10p
  # learning_rate: 14 #optimal fo 30p
  # learning_rate: 15 #optimal fo 30p
  # learning_rate: 13 #optimal fo 50p
  # learning_rate: 14 #optimal fo 50p

  # ^learning_rate: #10p
