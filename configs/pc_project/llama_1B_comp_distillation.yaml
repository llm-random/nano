defaults:
  - ../_cluster@_here_: helios
  - ../_model/llama@_here_: projected_1B
  - ../_trainer@_here_: llama3_1B_distillation
  - ../_dataset@_here_: fineweb
  - ../_checkpoints@_here_: none
  - ../_misc@_here_: default


common:
  sequence_length: 1024
  batch_size: 512


  dmodel: 448 # 10
  dff: 1728
  # dmodel: 960 # 30
  # dff: 3840
  # dmodel: 1344 # 50
  # dff: 5376

  target_dmodel: ${common.dmodel}
  target_dff: ${common.dff}


trainer:
  # gradient_accumulation_steps: 16 
  gradient_accumulation_steps: 8
  # gradient_accumulation_steps: 4
  ^n_steps: 
    # - 101
    - 2048
    # - 4096
    # - 8192
    # - 12288

  learning_rate: 13 # optimal 10% - may vary for diefferent context lenghts
  # learning_rate: 13 # optimal 30%
  # learning_rate: 13 # optimal 50%

  scheduler:
    warmup_steps: 40


  checkpoint:
   load:
    type: huggingface
    path: "meta-llama/Llama-3.2-1B"


infrastructure:
  metric_logger:
    name: Llame_PC
    tags:
      - nano
      - pc
      - llama_1
      - projected_compression
      - distillation
      - 10p
      # - 30p
      # - 50p
  

  slurm: 
    job-name: ${infrastructure.metric_logger.name}
    gres: gpu:4
    time: "0-24:00:00"

apply_functions:
  - _target_: src.projected_compression.compression.init_compression
    _partial_: true
    dimensions_importances_path: ???
    target_dmodel: ${common.dmodel}
    target_dff: ${common.dff}

