defaults:
  # - ../_cluster@_here_: helios #helios
  - ../_cluster@_here_: entropy
  - ../_model/llama@_here_: projected_1B
  - ../_trainer@_here_: llama3_1B_distillation
  - ../_dataset@_here_: fineweb
  - ../_checkpoints@_here_: none
  - ../_misc@_here_: default


common:
  sequence_length: 1024
  batch_size: 512


  dmodel: 448 # 10
  dff: 1728
  # dmodel: 960 # 30
  # dff: 3840
  # dmodel: 1344 # 50
  # dff: 5376
  # dmodel: 1728 # 75
  # dff: 6912
  # dmodel: 2048 # 100
  # dff: 8192

  target_dmodel: ${common.dmodel}
  target_dff: ${common.dff}


trainer:
  # gradient_accumulation_steps: 16 
  gradient_accumulation_steps: 8
  # gradient_accumulation_steps: 4
  ^n_steps: 
    # - 101
    - 2048
    # - 4096
    # - 8192
    # - 12288
    # - 16384
    # - 32768

  learning_rate: 13 # optimal 10% ???
  # learning_rate: 13 # optimal 30%
  # learning_rate: 13 # optimal 50%

  scheduler:
    warmup_steps: 40


  checkpoint:
   load:
    type: huggingface
    path: "meta-llama/Llama-3.2-1B"
  #  save:  
  #   type: nano
    # path: /storage_nvme_3/mstefaniak/nano_checkpoints/tmp # entropy
    # path: /net/scratch/hscra/plgrid/plgmstefaniak/checkpoints/tem # #helios

infrastructure:
  metric_logger:
    name: Llame_PC
    tags:
      - nano
      - pc
      - llama_1
      - projected_compression
      - distillation
      # - ta10b
      - 10p
      # - 30p
      # - 50p
      - 50p
  

  slurm: 
    job-name: ${infrastructure.metric_logger.name}
    gres: gpu:4
    # time: "0-0:15:00"
    # time: "0-3:30:00"
    # time: "0-12:00:00"
    time: "0-24:00:00"

apply_functions:
