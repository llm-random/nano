defaults:
  - ../_misc@_here_: default
  # - ../_cluster@_here_: helios
  - ../_cluster@_here_: entropy
  - ../_model/llama@_here_: 8B
  - _self_


trainer:
  checkpoint:
    load:
      type: huggingface
      path: "meta-llama/Llama-3.1-8B"

    save:
      path: /storage_nvme_3/mstefaniak/pc/llama38b.pt # CHANGE ME
      # path: /net/scratch/hscra/plgrid/plgmstefaniak/checkpoints/llama38b.pt

infrastructure:
  metric_logger:
    name: PC_save_pretrained_hf_to_nano
    tags:
      - nano
      - pc
      - save_pretrained
      - 8B
  
  slurm: 
    job-name: ${infrastructure.metric_logger.name}
    gres: gpu:1
    # time: "0-0:20:00"
    # time: "0-3:00:00"
    # time: "0-8:00:00"
    time: "0-24:00:00"

init_model_opt_sched_fn: 
  _target_: src.core.llama.save_pretrained_llama_as_nano
  _partial_: true